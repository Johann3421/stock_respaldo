services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      APP_NAME: "${APP_NAME:-StockSekai}"
      APP_ENV: "${APP_ENV:-production}"
      APP_KEY: "${APP_KEY}"
      APP_DEBUG: "${APP_DEBUG:-false}"
      APP_URL: "${APP_URL}"

      LOG_CHANNEL: stderr
      LOG_LEVEL: "${LOG_LEVEL:-error}"

      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: "${DB_DATABASE:-stocksekai}"
      DB_USERNAME: "${DB_USERNAME:-stocksekai}"
      DB_PASSWORD: "${DB_PASSWORD}"

      CACHE_STORE: database
      SESSION_DRIVER: database
      QUEUE_CONNECTION: database

      MAIL_MAILER: "${MAIL_MAILER:-smtp}"
      MAIL_HOST: "${MAIL_HOST:-}"
      MAIL_PORT: "${MAIL_PORT:-587}"
      MAIL_USERNAME: "${MAIL_USERNAME:-}"
      MAIL_PASSWORD: "${MAIL_PASSWORD:-}"
      MAIL_ENCRYPTION: "${MAIL_ENCRYPTION:-tls}"
      MAIL_FROM_ADDRESS: "${MAIL_FROM_ADDRESS:-noreply@example.com}"
      MAIL_FROM_NAME: "${MAIL_FROM_NAME:-StockSekai}"

      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET:-}"
      GOOGLE_REDIRECT_URI: "${GOOGLE_REDIRECT_URI:-}"
    volumes:
      - storage_data:/var/www/html/storage/app
      - logs_data:/var/www/html/storage/logs
    ports:
      # Use an environment-configurable host port to avoid conflicts.
      # Override HOST_APP_PORT in your host env or .env when starting locally.
      - "${HOST_APP_PORT:-18080}:80"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${DB_DATABASE:-stocksekai}"
      POSTGRES_USER: "${DB_USERNAME:-stocksekai}"
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-stocksekai} -d ${DB_DATABASE:-stocksekai}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  storage_data:
  logs_data:
